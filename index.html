<button onclick="openAddModal()">Add Word</button>

<div id="addModal" class="modal">

<div class="card">

<h2>Add Vocabulary</h2>

<input id="english" placeholder="English">

<input id="spanish" placeholder="Spanish">

<input id="italian" placeholder="Italian">

<input id="french" placeholder="French">

<input id="arabic" placeholder="Arabic">

<input id="arabic_pron" placeholder="Arabic pronunciation">

<input id="german" placeholder="German">

<input id="german_pron" placeholder="German pronunciation">

<input id="russian" placeholder="Russian">

<input id="russian_pron" placeholder="Russian pronunciation">

<select id="type">
<option>word</option>
<option>keyphrase</option>
<option>expression</option>
</select>

<button onclick="saveWord()">Save</button>

</div>
</div>
