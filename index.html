<button onclick="openAddModal()" class="addBtn">+ Add Word</button>

<div id="addModal" class="modal">

<div class="glassCard">

<h2>Add Vocabulary</h2>

<div class="field">
<label>English</label>
<input id="english">
</div>

<div class="field">
<label>Spanish</label>
<input id="spanish">
</div>

<div class="field">
<label>Italian</label>
<input id="italian">
</div>

<div class="field">
<label>French</label>
<input id="french">
</div>

<div class="field">
<label>Arabic</label>
<input id="arabic">
<input id="arabic_pron" placeholder="Pronunciation">
</div>

<div class="field">
<label>German</label>
<input id="german">
<input id="german_pron" placeholder="Pronunciation">
</div>

<div class="field">
<label>Russian</label>
<input id="russian">
<input id="russian_pron" placeholder="Pronunciation">
</div>

<div class="field">
<label>Type</label>
<select id="type">
<option value="word">Word</option>
<option value="keyphrase">Keyphrase</option>
<option value="expression">Expression</option>
</select>
</div>

<button onclick="saveWord()" class="saveBtn">Save Word</button>

</div>
</div>
